<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özcan'ın Atölyesi - Yapay Zeka Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0B111E;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .chat-container {
            height: calc(100vh - 140px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0B111E;
        }
        ::-webkit-scrollbar-thumb {
            background: #1E293B;
            border-radius: 3px;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Üst Bar / Header -->
    <header class="bg-[#111827] border-b border-[#1F2937] px-4 py-3 flex items-center justify-between z-10 shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-orange-600 to-amber-500 rounded-xl flex items-center justify-center shadow-md">
                <i class="fa-solid animate-pulse text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-wide text-white uppercase">Özcan'ın Atölyesi</h1>
                <p class="text-[11px] text-gray-400">Kişisel AI & Kod Asistanı v3.0</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-[#1F2937] px-2.5 py-1 rounded-full border border-[#374151]">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            <span class="text-[10px] font-bold tracking-wider text-green-400 uppercase">Zekî Mod</span>
        </div>
    </header>

    <!-- Sohbet Alanı -->
    <main id="chat-box" class="chat-container flex-1 overflow-y-auto p-4 space-y-4 bg-[#0F172A] relative">
        <!-- İlk Karşılama Mesajı -->
        <div class="flex items-start space-x-3 max-w-[85%]">
            <div class="w-8 h-8 bg-gradient-to-tr from-orange-600 to-amber-500 rounded-lg flex items-center justify-center flex-shrink-0 shadow-md">
                <i class="fa-solid text-white text-xs"></i>
            </div>
            <div class="bg-[#1E293B] border border-[#334155] rounded-2xl rounded-tl-none p-3.5 shadow-sm">
                <p class="text-sm leading-relaxed text-gray-200">
                    Özcan abi, sistem altyapısı tamamen Vercel Serverless mimarisine taşındı! Güvenli sunucu hattımız devrede. Şimdi sistemi test etmek için ilk sorunu yaz abi, yapay zeka arkadaki hattan doğrudan yanıtlayacak!
                </p>
                <span class="text-[9px] text-gray-500 block text-right mt-2 font-medium">Atölye AI • Şimdi</span>
            </div>
        </div>
    </main>

    <!-- Giriş Alanı / Sabit Alt Bar -->
    <footer class="bg-[#111827] border-t border-[#1F2937] p-4 z-10 shadow-2xl">
        <form id="chat-form" class="flex items-center space-x-2 max-w-4xl mx-auto relative">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Sorunu yaz abi, koda dökelim..." 
                autocomplete="off"
                class="w-full bg-[#1F2937] border border-[#374151] rounded-xl pl-4 pr-12 py-3.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200 shadow-inner"
            >
            <button 
                type="submit" 
                class="absolute right-2 top-1/2 -translate-y-1/2 bg-gradient-to-tr from-orange-600 to-amber-500 hover:from-orange-500 hover:to-amber-400 text-white w-9 h-9 rounded-lg flex items-center justify-center transition-all duration-200 shadow-md active:scale-95"
            >
                <i class="fa-solid text-sm"></i>
            </button>
        </form>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        // Mesaj geçmişini tutan dizi
        let conversationHistory = [];

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // Kullanıcı mesajını ekrana bas
            appendMessage('Özcan Çınar', message, true);
            userInput.value = '';

            // Geçmişe ekle
            conversationHistory.push({
                role: 'user',
                parts: [{ text: message }]
            });

            // Yükleniyor baloncuğu ekle
            const loadingId = appendLoadingMessage();

            try {
                // Vercel güvenli API hattımıza istek atıyoruz
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: conversationHistory })
                });

                if (!response.ok) throw new Error('Sunucu hatası');

                const data = await response.json();
                
                // Yükleniyor baloncuğunu kaldır
                removeLoadingMessage(loadingId);

                // Gelen cevabı oku
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                // Yapay zeka cevabını ekrana bas
                appendMessage('Atölye AI', aiResponse, false);

                // Geçmişe yapay zeka cevabını da ekle
                conversationHistory.push({
                    role: 'model',
                    parts: [{ text: aiResponse }]
                });

            } catch (error) {
                removeLoadingMessage(loadingId);
                appendMessage('Atölye AI', 'Özcan abi, güvenli sunucu hattı aktif ancak veri akışında ufak bir takılma oldu. Sayfayı yenileyip tekrar yazar mısın?', false);
                console.error(error);
            }
        });

        function appendMessage(sender, text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex items-start space-x-3 max-w-[85%] ${isUser ? 'ml-auto flex-row-reverse space-x-reverse' : ''}`;

            const iconHtml = isUser 
                ? `<div class="w-8 h-8 bg-gradient-to-br from-slate-700 to-slate-800 border border-slate-600 rounded-lg flex items-center justify-center flex-shrink-0 shadow-md"><i class="fa-solid text-slate-300 text-xs"></i></div>`
                : `<div class="w-8 h-8 bg-gradient-to-tr from-orange-600 to-amber-500 rounded-lg flex items-center justify-center flex-shrink-0 shadow-md"><i class="fa-solid text-white text-xs"></i></div>`;

            const bgClass = isUser 
                ? 'bg-gradient-to-br from-orange-600 to-amber-600 border border-orange-500 rounded-2xl rounded-tr-none text-white' 
                : 'bg-[#1E293B] border border-[#334155] rounded-2xl rounded-tl-none text-gray-200';

            msgDiv.innerHTML = `
                ${iconHtml}
                <div class="${bgClass} p-3.5 shadow-md">
                    <p class="text-sm leading-relaxed">${text.replace(/\n/g, '<br>')}</p>
                    <span class="text-[9px] ${isUser ? 'text-orange-200' : 'text-gray-500'} block text-right mt-2 font-medium">${sender} • Şimdi</span>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendLoadingMessage() {
            const id = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = id;
            loadingDiv.className = "flex items-start space-x-3 max-w-[85%] animate-pulse";
            loadingDiv.innerHTML = `
                <div class="w-8 h-8 bg-gradient-to-tr from-orange-600 to-amber-500 rounded-lg flex items-center justify-center flex-shrink-0 shadow-md">
                    <i class="fa-solid text-white text-xs"></i>
                </div>
                <div class="bg-[#1E293B] border border-[#334155] rounded-2xl rounded-tl-none p-3.5 shadow-sm">
                    <div class="flex space-x-1.5 items-center h-5 px-2">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                    </div>
                </div>
            `;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeLoadingMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>
</body>
</html>
